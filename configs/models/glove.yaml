# GLoVe based model configuration

# Text fields
title_field: title
abstract_field: abstract
use_abstract: false

# User representation
aggregation: mean  # Options: mean, sum, max

# Similarity function
similarity: cosine  # Options: cosine, dot

# Embedding configuration
embedding_source: glove
embedding_path: data/glove.6B.300d.txt
embedding_dim: 300

# Non-trainable model
epochs: 0
