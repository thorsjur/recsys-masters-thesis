# Pop (Popularity) Model Configuration
# Non-trainable baseline - ranks items by global popularity

# Training (needs 1 epoch to count item popularity)
epochs: 1
train_batch_size: 256

eval_max_neg_sample_num:
  val: 9 
  test: 9 # Cap at 9 negatives per positive

# Keep only impressions with at least 9 negatives so that
# the instability in results are less dependent on size of negatives.
# Should be used together with the eval_max_neg_sample num setting.
impression_negatives_num_interval:
  train:
  val: "[9,inf)"
  test: "[9,inf)"
