# MIND No Preprocessing Dataset Configuration

# Field definitions
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: label
TIME_FIELD: timestamp

# Data loading
load_col:
  inter: [user_id, item_id, label, timestamp, impression_id]
  item: [item_id, category, sub_category, title, abstract]

benchmark_filename: ['train', 'valid', 'test']

# Filtering (applied during ETL)
# user_inter_num_interval: "[5,inf)"
# item_inter_num_interval: "[5,inf)"

# pre-generated splits from ETL (RECOMMENDED)
eval_args:
  split: {'LS': 'valid_and_test'}
  group_by: none
  order: TO
  mode: {'valid': 'uni4', 'test': 'uni4'}

# Metrics
metrics: ['Recall', 'NDCG', 'Hit', 'Precision', 'MRR']
topk: [5, 10, 20, 50]
valid_metric: NDCG@10
