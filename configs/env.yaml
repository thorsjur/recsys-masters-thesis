# Prevents OOMs
eval_batch_size: 128

hist_field: history_item_id_list

# Uses the history of the user in each impression, instead
# of building it from the train split. This means that it will
# use the full history from start to the point of evaluation, meaning
# that evaluation represents a growing window, instead of a rolling window.
use_hist: true

# Use this flag to control whether the models should use only
# the title, or also include the concated abstract as well.
use_abstract: false


# ======== Needed for impression based sampling ===========
# Note that this must match the field naming from the .inter file
impr_neg_field: neg_item_id_list
impr_hist_field: history_item_id_list

# Custom eval args (needed for custom data loader, not used if not set)
# eval_neg_sample_num: # Use full (up to max) impressions for evaluation
# eval_max_neg_sample_num:
#   # Percentiles for MIND: p25=12, p50=31, p75=65, p90=104, p95=128, p99=197
#   val: 104 # Should cover about the 90% percentile of all negative impressions
#   test: # Use full impressions for test

eval_max_neg_sample_num:
  val: 9 
  test: 9 # Cap at 9 negatives per positive

# Keep only impressions with at least 9 negatives so that
# the instability in results are less dependent on size of negatives.
# Should be used together with the eval_max_neg_sample num setting.
impression_negatives_num_interval:
  train:
  val: "[9,inf)"
  test: "[9,inf)"


cand_field: cand_item_id
pos_index_field: pos_index

padding_idx: 0

# Covers so to say ALL titles and abstracts,
seq_len:
  title: 30 # Covers 100.00% of EB-NeRD abstracts, 99.97% of MIND titles
  abstract: 100 # covers 100.00% of EB-NeRD abstracts, 99.75% of MIND abstracts
  history_item_id_list: 50

enable_amp: true
enable_scaler: true